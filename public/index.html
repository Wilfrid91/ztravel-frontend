<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mon App Hybride</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Chargement dynamique de React uniquement pour les routes spécifiques -->
    <script>
      if (window.location.pathname.startsWith('/dashboard')) {
        const script = document.createElement('script')
        script.src = '%PUBLIC_URL%/static/js/main.js'
        document.body.appendChild(script)
      }
    </script>
  </body>
</html>
